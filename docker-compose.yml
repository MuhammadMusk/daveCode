services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-peershare}
      POSTGRES_USER: ${POSTGRES_USER:-peershare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-peershare}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./.env
    environment:
      POSTGRES_HOST: db
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend,web
      DJANGO_DEBUG: "1"
      DJANGO_SETTINGS_MODULE: peershare.settings
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    command: sh -lc "python manage.py migrate --noinput && python manage.py collectstatic --noinput || true; if [ \"${SEED_DEMO_DATA:-1}\" = \"1\" ]; then python manage.py seed_skills || true; fi; exec daphne -b 0.0.0.0 -p 8000 peershare.asgi:application"

  web:
    build:
      context: .
      dockerfile: ./deploy/nginx/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata: